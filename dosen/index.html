<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Portal UNPAB - Dosen </title>
    <link rel="icon" href="../assets/image/logo_unpab_4x.png" sizes="769x775">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');
        :root {
            --yellow: #fed900;
            --black: #0d0a0a;
            --white: #fefefe;
            --blue: #00a2e9;
        }
        .lato {
            font-family: "Lato", sans-serif;
        }
        .montserrat {
            font-family: "Montserrat", sans-serif;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <meta name="title" content="Portal UNPAB - Admin">
    <meta name="author" content="Jeremi Salvatores Sihotang">
    <link rel="canonical" href="https://portofolio-junior-programmer.netlify.app/">
</head>
<body class="bg-[var(--yellow)] min-w-full min-h-screen lato flex flex-col items-center justify-center gap-5 p-2">
    <header class="flex flex-col items-center justify-center gap-5">
        <img src="../assets/image/logo_unpab_4x.png" alt="logo-unpab" width="769" height="775" loading="lazy" class="w-[100px] h-auto"/>
        <h1 class="montserrat font-bold text-base text-center"> Dashboard Dosen Universitas Pembangunan Panca Budi </h1>
    </header>
    <main>
        <section class="bg-[var(--white)] p-5 rounded-md shadow-md border-1 border-[var(--blue)]">
            <div class="flex flex-col gap-4 w-3xs text-center" id="info-container">
                <div class="flex gap-2 items-center justify-center text-red-500">
                    <i data-feather="info"></i>
                    <h2 class="montserrat font-bold text-base"> For You Information </h2>
                </div>
                <p class="font-medium text-sm"> Disarankan membuka melalui komputer atau laptop, agar mendapatkan tampilan yang terbaik. </p>
                <button type="button" id="info-btn" class="bg-[var(--blue)] py-2 px-2 rounded-md shadow-md text-[var(--white)] montserrat font-bold text-sm cursor-pointer"> Saya paham </button>
            </div>
            <div class="flex flex-col gap-4 hidden" id="login-container">
                <div class="flex flex-col gap-2">
                    <label for="username" class="montserrat font-medium text-sm"> Username: </label>
                    <div class="flex gap-2 items-center">
                        <i data-feather="user"></i>
                        <input type="text" placeholder="Masukkan username" id="username" class="font-medium text-sm border-1 py-2 px-2 rounded-md border-[var(--blue)] w-3xs" minlength="6" maxlength="20" />
                    </div>
                </div>
                <div class="flex flex-col gap-2">
                    <label for="password" class="montserrat font-medium text-sm"> Password: </label>
                    <div class="flex gap-2 items-center relative">
                        <i data-feather="key"></i>
                        <input type="password" placeholder="Masukkan password" id="password" class="font-medium text-sm border-1 py-2 px-2 rounded-md border-[var(--blue)] w-3xs" minlength="6" maxlength="20" />
                        <div class="absolute right-2 cursor-pointer" id="password-btn">
                            <i data-feather="eye"></i>
                        </div>
                    </div>
                </div>
                <button type="submit" id="login" class="bg-[var(--blue)] px-2 py-2 rounded-md shadow-md font-bold text-base text-[var(--white)] cursor-pointer"> Login </button>
            </div>
        </section>
    </main>
    <footer>
        <p class="font-bold text-base p-2 text-center"> Biro Pengelola Sistem Informasi - 2009 </p>
    </footer>

<script src="script.js" defer></script>
<script>
    feather.replace();
</script>
</body>
</html>
